        .hidden-app { display: none !important; }
        .modal-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        #splash-screen { transition: opacity 0.8s ease-out; }

        .paw-step { position: absolute; left: 50%; top: 50%; opacity: 0; font-size: 2.5rem; z-index: 5; }
        @keyframes walkIn {
            0% { opacity: 0; transform: scale(0.5) rotate(var(--rot)); color: #C48A8A; }
            30% { opacity: 1; transform: scale(1.1) rotate(var(--rot)); color: #3D6E79; }
            80% { opacity: 0.1; transform: scale(1) rotate(var(--rot)); color: #C48A8A; }
            100% { opacity: 0; transform: scale(1) rotate(var(--rot)); }
        }
        .paw-1 { margin-left: -50px; margin-top: 150px; --rot: -15deg; animation: walkIn 1.2s 0.1s forwards; }
        .paw-2 { margin-left:  30px; margin-top:  80px; --rot: 15deg; animation: walkIn 1.2s 0.4s forwards; }
        .paw-3 { margin-left: -30px; margin-top:  10px; --rot: -10deg; animation: walkIn 1.2s 0.7s forwards; }
        .paw-4 { margin-left:  40px; margin-top: -60px; --rot: 10deg; animation: walkIn 1.2s 1.0s forwards; }
        .paw-5 { margin-left: -10px; margin-top:-130px; --rot: -15deg; animation: walkIn 1.2s 1.3s forwards; }
        .splash-logo-container { opacity: 0; animation: fadeInLogo 1s 1.8s forwards; transform: translateY(20px); z-index: 10; }
        @keyframes fadeInLogo { to { opacity: 1; transform: translateY(0); } }

                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-mascotik-rose/20 text-center mb-4 animate-[slideUp_0.2s_ease-out]">

                            <div class="bg-amber-50 p-2.5 rounded-xl border border-amber-200/40"><span class="text-[8px] text-amber-600 block uppercase font-black"><i class="fa-solid fa-triangle-exclamation"></i> Diagnóstico</span><span class="text-[9px] font-bold text-amber-900 leading-tight block">${p.pathology}</span></div>
                            <div class="col-span-2 bg-red-50 p-2.5 rounded-xl border border-red-200/40 flex items-center gap-2">
                                <i class="fa-solid fa-clock-rotate-left text-red-500 text-lg animate-pulse"></i>
                                <div><span class="text-[8px] text-red-600 block uppercase font-black">Alarma Médica</span><span class="text-[10px] font-bold text-red-900">${p.alarm}</span></div>
                            </div>
                        </div>
                    </div>
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-gray-100 mb-4">
                        <h4 class="font-black text-xs text-mascotik-teal mb-2"><i class="fa-solid fa-stethoscope"></i> Controles Clínicos</h4>
                        <p class="text-[10px] text-gray-600 mb-1"><b>Último control:</b> ${p.lastControl} (${p.lastClinic})</p>

                        <h4 class="font-black text-xs text-mascotik-teal mb-2"><i class="fa-solid fa-syringe"></i> Carnet de Vacunación</h4>
                        <div class="space-y-1.5">${p.vaccines.map(v => `<div class="flex items-center gap-2 text-[10px] text-gray-600"><i class="fa-solid ${v.includes('Al día')?'fa-circle-check text-emerald-500':'fa-circle-dot text-amber-500'}"></i> ${v}</div>`).join('')}</div>
                    </div>
                `;
            }
            else if (menuId === 'marketplace') {
                modalTitle.innerText = "Pet Market Pasto";
                modalBody.innerHTML = `
                    <div class="space-y-4 animate-[slideUp_0.2s_ease-out]">
                        <div>
                            <h4 class="font-black text-xs text-mascotik-teal mb-2 border-b border-gray-100 pb-1"><i class="fa-solid fa-hospital"></i> Clínicas Veterinarias</h4>
                            ${db.marketplace.veterinarias.map(v => `
                                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm text-[10px]">
                                    <h5 class="font-bold text-gray-800">${v.name}</h5><p class="text-gray-500">Dir: ${v.dir} | Serv: ${v.serv}</p>
                                    <a href="tel:${v.phone.replace(/ /g,'')}" class="mt-2 inline-block bg-cyan-600 text-white text-[9px] px-2 py-1 rounded font-bold">Llamar ${v.phone}</a>
                                </div>`).join('')}
                        </div>
                        <div>
                            <h4 class="font-black text-xs text-mascotik-teal mb-2 border-b border-gray-100 pb-1"><i class="fa-solid fa-scissors"></i> Estéticas y Peluquerías</h4>
                            ${db.marketplace.esteticas.map(e => `
                                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm text-[10px]">
                                    <h5 class="font-bold text-gray-800">${e.name}</h5><p class="text-gray-500">Dir: ${e.dir} | Serv: ${e.serv}</p>
                                    <a href="tel:${e.phone.replace(/ /g,'')}" class="mt-2 inline-block bg-pink-600 text-white text-[9px] px-2 py-1 rounded font-bold">Llamar ${e.phone}</a>
                                </div>`).join('')}
                        </div>
                        <div>
                            <h4 class="font-black text-xs text-mascotik-teal mb-2 border-b border-gray-100 pb-1"><i class="fa-solid fa-store"></i> Tiendas de Accesorios / Alimento</h4>
                            ${db.marketplace.tiendas.map(t => `
                                <div class="bg-white p-3 rounded-2xl border border-gray-100 shadow-sm text-[10px]">
                                    <h5 class="font-bold text-gray-800">${t.name}</h5><p class="text-gray-500">Dir: ${t.dir} | Oferta: ${t.serv}</p>
                                    <a href="tel:${t.phone.replace(/ /g,'')}" class="mt-2 inline-block bg-amber-500 text-white text-[9px] px-2 py-1 rounded font-bold">Llamar ${t.phone}</a>
                                </div>`).join('')}
                        </div>
                        <div>
                            <h4 class="font-black text-xs text-mascotik-teal mb-2 border-b border-gray-100 pb-1"><i class="fa-solid fa-handshake"></i> Ventas de Segundamano (Usuarios)</h4>
                            ${db.marketplace.usuarios.map(u => `
                                <div class="bg-white p-3 rounded-2xl border border-red-100 bg-red-50/20 shadow-sm text-[10px] flex justify-between items-center">
                                    <div><h5 class="font-bold text-gray-800">${u.item}</h5><p class="text-gray-400">Vendedor: ${u.name}</p><p class="text-mascotik-rose font-bold">${u.price}</p></div>
                                    <a href="https://wa.me/57${u.phone.replace(/ /g,'')}?text=Hola,%20me%20interesa%20el%20artículo%20${encodeURIComponent(u.item)}" target="_blank" class="w-8 h-8 bg-emerald-500 text-white rounded-full flex items-center justify-center text-base shadow"><i class="fa-brands fa-whatsapp"></i></a>
                                </div>`).join('')}
                        </div>
                    </div>
                `;
            }
            else if (menuId === 'pacientes') {
                modalTitle.innerText = "Panel: Dr. Carlos Ruiz";
                modalBody.innerHTML = `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-cyan-100 mb-4 text-[11px]">
                        <h4 class="font-bold text-cyan-700 mb-2"><i class="fa-solid fa-notes-medical"></i> Pacientes Asignados</h4>
                        <div class="space-y-2">
                            ${db.users.vet1.patients.map(p => `
                                <div class="bg-animal-sand p-3 rounded-xl">
                                    <h5 class="font-black text-mascotik-teal">${p.name} (${p.breed})</h5>
                                    <p class="text-[10px] text-gray-500">Edad: ${p.age} | Dueño: ${p.owner}</p>
                                    <a href="tel:${p.phone}" class="text-cyan-600 font-bold block mt-1 text-[9px]"><i class="fa-solid fa-phone"></i> Llamar dueño (${p.phone})</a>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (menuId === 'clientes') {
                modalTitle.innerText = "Clientes: PetShop Central";
                modalBody.innerHTML = `
                    <div class="bg-white p-4 rounded-3xl shadow-sm border border-amber-100 mb-4 text-[11px]">
                        <h4 class="font-bold text-amber-700 mb-2"><i class="fa-solid fa-users"></i> Historial de Compras</h4>
                        <div class="space-y-2">
                            ${db.users.tienda1.clients.map(c => `
                                <div class="bg-animal-sand p-3 rounded-xl">
                                    <h5 class="font-black text-mascotik-teal">${c.name}</h5>
                                    <p class="text-[9px] text-gray-500 mb-1">Tel: ${c.phone}</p>
                                    <div class="text-[9px] text-gray-600 font-medium"><b>Últimos artículos:</b> ${c.purchases.join(', ')}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            else if (menuId === 'admin') {
                modalTitle.innerText = "Consola Administrador";
                modalBody.innerHTML = `
                    <div class="bg-slate-800 text-white p-4 rounded-3xl shadow-sm space-y-3 text-xs">
                        <p><i class="fa-solid fa-chart-line text-emerald-400"></i> <b>Usuarios Activos en Pasto:</b> 1,240</p>
                        <p><i class="fa-solid fa-triangle-exclamation text-red-400"></i> <b>Alertas SOS de hoy:</b> 2 activas</p>
                        <p><i class="fa-solid fa-shield text-cyan-400"></i> <b>Paseadores verificados:</b> 2</p>
                        <button onclick="alert('Descargando logs analíticos...')" class="w-full bg-slate-700 text-center py-2 rounded-xl text-[10px] font-bold border border-slate-600 hover:bg-slate-600">Descargar Reporte del Sistema (.csv)</button>
                    </div>
                `;
            }
            else if (menuId === 'pacientes' || menuId === 'clientes' || menuId === 'admin') {}
            else {
                modalTitle.innerText = "Mascotik App";
                modalBody.innerHTML = `<p class="text-center text-xs text-gray-400 py-10">Módulo en construcción.</p>`;
            }
        }

        function reportarAvistamiento(name, wa) {
            alert('Simulación: Se ha tomado tu geolocalización GPS actual.');
            window.open(`https://wa.me/${wa}?text=Hola,%20acabo%20de%20ver%20a%20tu%20mascota%20${name}%20cerca%20de%20mi%20ubicación%20actual.%20¡Espero%20que%20lo%20encuentres!`, '_blank');
        }

        function openModal() {
            var modalContainer = document.getElementById('modals-container');
            var modalTitle = document.getElementById('modal-title');
            var modalBody = document.getElementById('modal-body');
            if(!modalContainer || !modalTitle || !modalBody) return;

            modalContainer.classList.remove('hidden-app');
            modalContainer.classList.add('flex');
            modalTitle.innerText = "Cambiar de Perfil (Simulador)";
            modalBody.innerHTML = `
                <div class="space-y-3 animate-[slideUp_0.2s_ease-out]">
                    <button onclick="login('dueno1')" class="w-full bg-white border border-mascotik-rose p-3 rounded-2xl font-bold text-sm text-mascotik-rose shadow-sm flex items-center justify-center gap-2 hover:bg-mascotik-rose hover:text-white transition"><i class="fa-solid fa-user"></i> Dueño de Mascota</button>
                    <button onclick="login('vet1')" class="w-full bg-white border border-cyan-500 p-3 rounded-2xl font-bold text-sm text-cyan-600 shadow-sm flex items-center justify-center gap-2 hover:bg-cyan-500 hover:text-white transition"><i class="fa-solid fa-user-doctor"></i> Médico Veterinario</button>
                    <button onclick="login('tienda1')" class="w-full bg-white border border-amber-500 p-3 rounded-2xl font-bold text-sm text-amber-600 shadow-sm flex items-center justify-center gap-2 hover:bg-amber-500 hover:text-white transition"><i class="fa-solid fa-store"></i> Tienda Pet</button>
                    <button onclick="login('admin1')" class="w-full bg-slate-800 border border-slate-900 p-3 rounded-2xl font-bold text-sm text-white shadow-sm flex items-center justify-center gap-2 hover:bg-slate-900 transition"><i class="fa-solid fa-cogs"></i> Administrador</button>
                    <div class="pt-4 border-t border-gray-100">
                        <button onclick="logout()" class="w-full bg-gray-100 p-2.5 rounded-xl text-xs font-bold text-gray-500 text-center hover:bg-gray-200 transition">Cerrar Sesión Activa / Volver a Invitado</button>
                    </div>
                </div>
            `;
        }

        function closeModal() {
            var modalContainer = document.getElementById('modals-container');
            if (modalContainer) {
                modalContainer.classList.add('hidden-app');
                modalContainer.classList.remove('flex');
            }
        }

        function openChatbot() {
            var chat = document.getElementById('chatbot-container');
            if (chat) {
                chat.classList.remove('hidden-app');
                chat.classList.add('flex');
            }
        }

        function closeChatbot() {
            var chat = document.getElementById('chatbot-container');
            if (chat) {
                chat.classList.add('hidden-app');
                chat.classList.remove('flex');
            }
        }

        function handleSendChat() {
            var input = document.getElementById('chatbot-input');
            if (!input || !input.value.trim()) return;
            
            var userText = input.value.trim();
            appendChatMessage('user', userText);
            input.value = '';
            
            setTimeout(function() {
                var response = "¡Entendido! Como tu asistente inteligente de Mascotik, te recomiendo que revises la sección de 'Aprende' o contactes a un experto si es un síntoma inusual. ¿Te gustaría saber algo específico sobre cuidados o alimentación? 🐾";
                
                var lower = userText.toLowerCase();
                if(lower.includes('trufa') || lower.includes('camara') || lower.includes('reconocer')) {
                    response = "Iniciando escáner de reconocimiento biométrico de trufa... 📸 Analizando pliegues nasales. Recuerda tomar la foto con buena luz natural para verificar la identidad única de tu mascota.";
                } else if(lower.includes('medica') || lower.includes('enfermo') || lower.includes('vomito') || lower.includes('duele')) {
                    response = "He detectado una consulta con palabras de alerta médica. Te recomiendo ingresar inmediatamente al módulo <b>'Veterinario Amigo'</b> de la app para contactar express por WhatsApp a un médico titulado en Pasto.";
                }
                
                appendChatMessage('bot', response);
            }, 800);
        }

        function sendQuickMessage(text) {
            appendChatMessage('user', text);
            setTimeout(function() {
                var response = "";
                if(text.includes('Trufa')) {
                    response = "Abriendo cámara integrada para escaneo biométrico de trufa nasal... 📸 Por favor, enfoca la nariz de tu perro a una distancia de 10cm. Esto servirá como huella dactilar digital de seguridad.";
                } else {
                    response = "Accediendo a la base de datos de primeros auxilios y sintomatología clínica básica... 🩺 Si tu mascota presenta decaimiento prolongado, no dudes en pulsar el menú de **Veterinario Amigo**.";
                }
                appendChatMessage('bot', response);
            }, 600);
        }

        function appendChatMessage(sender, text) {
            var container = document.getElementById('chatbot-messages');
            if (!container) return;
            
            var msgDiv = document.createElement('div');
            if (sender === 'user') {
                msgDiv.className = "flex gap-2 w-full max-w-[85%] ml-auto justify-end animate-[slideUp_0.2s_ease-out]";
                msgDiv.innerHTML = `
                    <div class="bg-mascotik-teal text-white p-3 rounded-2xl rounded-br-none shadow-sm text-xs leading-relaxed">${text}</div>
                `;
            } else {
                msgDiv.className = "flex gap-2 w-full max-w-[85%] animate-[slideUp_0.2s_ease-out]";
                msgDiv.innerHTML = `
                    <div class="w-8 h-8 rounded-full bg-mascotik-teal flex items-center justify-center text-white text-xs shrink-0 mt-auto shadow"><i class="fa-solid fa-robot"></i></div>
                    <div class="bg-white p-3 rounded-2xl rounded-bl-none shadow-sm text-xs text-gray-700 leading-relaxed border border-gray-100">${text}</div>
                `;
            }
            container.appendChild(msgDiv);
            container.scrollTop = container.scrollHeight;
        }
    </script>
</body>
